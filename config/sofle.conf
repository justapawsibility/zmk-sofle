# Sofle MX — ZMK Config
# Controller: nice!nano v2 (NRF52840)

# ── Encoders ────────────────────────────────────────────────────────────────
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ── Mouse keys ──────────────────────────────────────────────────────────────
CONFIG_ZMK_MOUSE=y

# ── RGB ─────────────────────────────────────────────────────────────────────
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n

# ── Bluetooth ───────────────────────────────────────────────────────────────
# Allow up to 5 BT profiles (switch via ADJUST layer BT_SEL 0-3)
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# ── Power management ────────────────────────────────────────────────────────
# Sleep after 30 minutes idle to save battery
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# ── Split ───────────────────────────────────────────────────────────────────
# Left half is central (master), right is peripheral
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_BATTERY_REPORTING=y

